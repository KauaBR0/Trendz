openapi: 3.0.3
info:
  title: Trendz API
  version: 1.0.0
  description: API MVP para atender o frontend Trendz sem mocks.
servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Users
  - name: Markets
  - name: Bets
  - name: Esports

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário criado e sessão iniciada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login por email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Sessão iniciada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout do usuário
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Sessão encerrada
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Retorna usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /markets:
    get:
      tags: [Markets]
      summary: Lista mercados
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Busca por título/categoria
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/MarketType'
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Lista paginada de mercados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketListResponse'

  /markets/{marketId}:
    get:
      tags: [Markets]
      summary: Detalhe de mercado
      parameters:
        - $ref: '#/components/parameters/MarketId'
      responses:
        '200':
          description: Mercado detalhado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDetail'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /markets/{marketId}/activity:
    get:
      tags: [Markets]
      summary: Atividades do mercado
      parameters:
        - $ref: '#/components/parameters/MarketId'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Lista paginada de atividades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /bets:
    post:
      tags: [Bets]
      summary: Criar aposta
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBetRequest'
      responses:
        '201':
          description: Aposta criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BetCreateResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

    get:
      tags: [Bets]
      summary: Listar apostas do usuário
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, resolved, canceled]
            default: open
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Lista paginada de apostas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BetListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /esports/games:
    get:
      tags: [Esports]
      summary: Lista jogos de e-sports suportados
      responses:
        '200':
          description: Lista de jogos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EsportsGameListResponse'

  /esports/matches/upcoming:
    get:
      tags: [Esports]
      summary: Lista partidas futuras
      parameters:
        - in: query
          name: game
          schema:
            type: string
          description: Slug do jogo (ex: valorant, csgo, lol, dota2)
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista de partidas futuras
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EsportsMatchListResponse'

  /esports/matches/running:
    get:
      tags: [Esports]
      summary: Lista partidas em andamento
      parameters:
        - in: query
          name: game
          schema:
            type: string
          description: Slug do jogo (ex: valorant, csgo, lol, dota2)
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista de partidas em andamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EsportsMatchListResponse'

  /esports/matches/past:
    get:
      tags: [Esports]
      summary: Lista partidas finalizadas
      parameters:
        - in: query
          name: game
          schema:
            type: string
          description: Slug do jogo (ex: valorant, csgo, lol, dota2)
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Lista de partidas finalizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EsportsMatchListResponse'

  /esports/matches/{esportsMatchId}:
    get:
      tags: [Esports]
      summary: Detalhe de uma partida de e-sports
      parameters:
        - $ref: '#/components/parameters/EsportsMatchId'
      responses:
        '200':
          description: Partida encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EsportsMatch'
        '404':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MarketId:
      in: path
      name: marketId
      required: true
      schema:
        type: string
    EsportsMatchId:
      in: path
      name: esportsMatchId
      required: true
      schema:
        type: string
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    ErrorResponse:
      description: Erro de negócio/validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    MarketType:
      type: string
      enum: [binary, multiple]

    Choice:
      type: string
      enum: [Sim, Não]

    User:
      type: object
      required: [id, name, email, avatar, balance]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatar:
          type: string
          format: uri
        balance:
          type: number
          format: float

    RegisterRequest:
      type: object
      required: [cpf, phone, email, acceptTerms, isAdult]
      properties:
        cpf:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        acceptTerms:
          type: boolean
        isAdult:
          type: boolean

    LoginRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshToken:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    MarketListItem:
      type: object
      required: [id, title, image, type, category, volume, endDate]
      properties:
        id:
          type: string
        title:
          type: string
        image:
          type: string
          format: uri
        type:
          $ref: '#/components/schemas/MarketType'
        category:
          type: string
        volume:
          type: number
          format: float
        endDate:
          type: string
          format: date-time

    MarketOption:
      type: object
      required: [id, name, image, chance, yesOdds, noOdds]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
          format: uri
        chance:
          type: integer
          minimum: 0
          maximum: 100
        yesOdds:
          type: number
          format: float
        noOdds:
          type: number
          format: float

    BinaryData:
      type: object
      required: [yesChance, noChance, yesOdds, noOdds]
      properties:
        yesChance:
          type: integer
          minimum: 0
          maximum: 100
        noChance:
          type: integer
          minimum: 0
          maximum: 100
        yesOdds:
          type: number
          format: float
        noOdds:
          type: number
          format: float

    MarketDetail:
      allOf:
        - $ref: '#/components/schemas/MarketListItem'
        - type: object
          required: [rules]
          properties:
            rules:
              type: string
            options:
              type: array
              items:
                $ref: '#/components/schemas/MarketOption'
            binaryData:
              $ref: '#/components/schemas/BinaryData'

    MarketListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MarketListItem'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    ActivityItem:
      type: object
      required: [id, user, action, choice, amount, contracts, createdAt, avatar]
      properties:
        id:
          type: string
        user:
          type: string
        action:
          type: string
          example: comprou
        choice:
          $ref: '#/components/schemas/Choice'
        amount:
          type: number
          format: float
        contracts:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time
        avatar:
          type: string
          format: uri

    ActivityListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItem'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    CreateBetRequest:
      type: object
      required: [marketId, choice, amount]
      properties:
        marketId:
          type: string
        optionId:
          type: string
          nullable: true
        choice:
          $ref: '#/components/schemas/Choice'
        amount:
          type: number
          format: float
          minimum: 0.01

    BetItem:
      type: object
      required: [id, marketId, marketTitle, optionName, choice, amount, odds, potentialReturn, status, createdAt]
      properties:
        id:
          type: string
        marketId:
          type: string
        marketTitle:
          type: string
        optionName:
          type: string
        choice:
          $ref: '#/components/schemas/Choice'
        amount:
          type: number
          format: float
        odds:
          type: number
          format: float
        potentialReturn:
          type: number
          format: float
        status:
          type: string
          enum: [open, resolved, canceled]
        createdAt:
          type: string
          format: date-time

    BetCreateResponse:
      allOf:
        - $ref: '#/components/schemas/BetItem'
        - type: object
          required: [userBalance]
          properties:
            userBalance:
              type: number
              format: float

    BetListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BetItem'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer

    EsportsGame:
      type: object
      required: [id, slug, name]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string

    EsportsOpponent:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        image:
          type: string
          format: uri
          nullable: true

    EsportsLeague:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        image:
          type: string
          format: uri
          nullable: true

    EsportsSerie:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    EsportsTournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    EsportsMatch:
      type: object
      required: [id, slug, name, status, beginAt, videogame, opponents]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        status:
          type: string
        beginAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true
        videogame:
          $ref: '#/components/schemas/EsportsGame'
        opponents:
          type: array
          items:
            $ref: '#/components/schemas/EsportsOpponent'
        league:
          $ref: '#/components/schemas/EsportsLeague'
        serie:
          $ref: '#/components/schemas/EsportsSerie'
        tournament:
          $ref: '#/components/schemas/EsportsTournament'

    EsportsGameListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EsportsGame'

    EsportsMatchListResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EsportsMatch'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
